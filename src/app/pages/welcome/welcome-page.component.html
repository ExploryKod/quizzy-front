<div class="welcome-page page">
  <div class="welcome-page__intro">
    <div class="welcome-page__text-wrapper">
      <h1 class="welcome-page__title">
       {{ 'welcomePage.pretitle' | translate }}<br/>
       <span class="welcome-page__end-title">{{ 'welcomePage.title' | translate }}</span>
      </h1>
      <div class="welcome-page__description">
        {{ 'welcomePage.description' | translate }}
      </div>
    </div>
    <div class="welcome-page__quizzes-wrapper">
      @if (quizzes$ | async; as quizzes) {
        @if (quizzes.length > 0) {
          <qzy-quiz-button-list [quizzes]="quizzes" (quizClick)="onQuizButtonClick($event)"></qzy-quiz-button-list>
        } @else {
          <p class="welcome-page__empty-state">{{ 'welcomePage.noQuizAvailable' | translate }}</p>
        }
      }
    </div>
  </div>
</div>
