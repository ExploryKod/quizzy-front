<div class="quiz-questions-banner">
    <div class="quiz-questions-banner__inner-container">
        <div class="quiz-questions-banner__content-texts">
            @if (quizIcon) {
                <img class="quiz-questions-banner__icon" [src]="quizIcon" [alt]="quizTitle" />
            }
          <h2 class="quiz-questions-banner__title">{{ quizTitle || 'Quiz' }}</h2>
        </div>
        <div class="quiz-questions-banner__content-theme-switch">
            <span class="quiz-questions-banner__switch-icon" aria-hidden="true">☼</span>
            <label class="quiz-questions-banner__switch" aria-label="Toggle theme">
                <input
                    class="quiz-questions-banner__switch-input"
                    type="checkbox"
                    [checked]="isDarkMode"
                    (change)="onToggle($event)"
                />
                <span class="quiz-questions-banner__switch-slider"></span>
            </label>
            <span class="quiz-questions-banner__switch-icon" aria-hidden="true">☽</span>
        </div>
    </div>
</div>
